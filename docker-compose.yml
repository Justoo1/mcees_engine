services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mcees}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mcees}
      POSTGRES_DB: ${POSTGRES_DB:-mcees_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mcees} -d ${POSTGRES_DB:-mcees_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER:-mcees}:${POSTGRES_PASSWORD:-mcees}@postgres:5432/${POSTGRES_DB:-mcees_db}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A workers.celery_app worker --loglevel=info --queues=orders,customers,inventory
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER:-mcees}:${POSTGRES_PASSWORD:-mcees}@postgres:5432/${POSTGRES_DB:-mcees_db}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mcees}:${POSTGRES_PASSWORD:-mcees}@postgres:5432/${POSTGRES_DB:-mcees_db}
      API_URL: http://api:8000
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - app_network

volumes:
  postgres_data:
  redis_data:

networks:
  app_network:
    driver: bridge
